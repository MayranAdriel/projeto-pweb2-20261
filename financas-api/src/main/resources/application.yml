spring:
  datasource:
    url: jdbc:h2:mem:financasdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true        # access at /h2-console
  jpa:
    hibernate:
      ddl-auto: validate   # Flyway owns the schema; Hibernate only validates
    show-sql: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

jwt:
  secret: "financas-app-secret-key-20261abc"
  expiration-ms: 86400000  # 24 h